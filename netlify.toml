[build]
  # Directory to change to before starting a build
  base = "."
  # Directory that contains the deploy-ready HTML files and assets generated by the build
  publish = "dist"
  # Default build command
  command = "npm run build"

[build.environment]
  # Node.js version for builds
  NODE_VERSION = "20"

# Redirect rules for SPA functionality
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Admin routes protection (if needed)
[[redirects]]
  from = "/admin/*"
  to = "/admin/login"
  status = 200
  conditions = {Role = ["admin"]}

# Environment variables for production (configured in Netlify dashboard)

# Build hooks for content updates
[build.hooks]
  # This would trigger a rebuild when content changes
  # You'll need to set this up in Netlify dashboard

# Functions directory (if we add serverless functions)
[functions]
  directory = "netlify/functions"